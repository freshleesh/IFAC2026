lqr:
  ros__parameters:
    # ── 차량 기본 설정 ────────────────────────────────────────────────────────
    wheelbase:        0.33    # [m] 앞뒤 축간 거리 — 실차 측정값으로 교체
    max_steering_rad: 0.4     # [rad] 최대 조향각 한계 (≈ 22.9°)
    max_speed_mps:    8.0     # [m/s] 속도 상한 클리핑
    speed_scale:      1.0     # [-] 전체 속도 배율 (0.5 → 50% 속도)
    control_rate_hz:  50.0    # [Hz] 제어 루프 주기
    drive_topic:      "/vesc/high_level/ackermann_cmd"

    # ── LQR 비용 가중치 ───────────────────────────────────────────────────────
    #
    #  비용 함수: J = Σ (q_d·e_d² + q_theta·e_θ² + r_delta·δ²)
    #
    #  q_d  [lateral error weight]
    #    - 횡방향 오차(e_d) 에 대한 페널티
    #    - 증가 → raceline 을 더 빡빡하게 추종 (정밀도 ↑, 진동 위험)
    #    - 감소 → 부드럽게 추종하나 오차가 커질 수 있음
    #    - 권장 시작값: 1.0 / 공격적 추종: 5.0~10.0
    q_d: 1.0

    #  q_theta  [heading error weight]
    #    - 헤딩 오차(e_θ) 에 대한 페널티
    #    - 증가 → 차량이 경로 방향에 빠르게 정렬 (코너 대응 빠름)
    #    - 감소 → 헤딩 오차 허용 범위 커짐 (요잉 감소)
    #    - 권장 시작값: 1.0 / 코너 대응 개선: 2.0~5.0
    q_theta: 1.0

    #  r_delta  [steering input weight]
    #    - 조향 입력(δ) 에 대한 페널티
    #    - 증가 → 조향이 부드러워짐 (서보 부하 감소, 추종 정밀도 하락)
    #    - 감소 → 더 공격적인 조향 (정밀도 ↑, 진동/헌팅 위험)
    #    - 권장 시작값: 1.0 / 부드럽게: 5.0~10.0 / 공격적: 0.1~0.5
    r_delta: 100.0

    # ── 튜닝 방향 요약 ────────────────────────────────────────────────────────
    #
    #  직선 추종 정밀도 향상:  q_d ↑  또는  r_delta ↓
    #  코너 진입 빠른 대응:    q_theta ↑
    #  진동/헌팅 감소:         r_delta ↑  또는  q_d ↓
    #  전체 반응 줄이기:       q_d ↓, q_theta ↓  (또는 r_delta ↑)
    #
    #  주의: q_d / r_delta 비율이 실질적인 공격성 결정.
    #        예) q_d=10, r_delta=1  ≈  q_d=1, r_delta=0.1  (같은 비율)
    # ─────────────────────────────────────────────────────────────────────────

    # ── Adaptive lookahead (Preview LQR) ─────────────────────────────────────
    #
    #  e_θ (헤딩 오차) 와 κ_ff (곡률 feedforward) 는 lookahead 점 기준으로 계산.
    #  e_d (횡방향 오차) 는 nearest waypoint 기준으로 계산 (현재 위치 교정).
    #
    #  ld = k_v · v / (1 + k_k · |κ|)  — nearest + lookahead kappa 둘 다 반영
    #
    #  ld_min  : 저속/급커브 최솟값 — 너무 작으면 진동 재발
    #  ld_max  : 고속 최댓값 — 너무 크면 코너 반응 둔해짐
    #  k_v     : 속도 비례 계수 (ld ∝ v)
    #  k_k     : 곡률에 따른 ld 감소 계수 (코너에서 더 짧게)
    #
    #  oscillation 심하면 ld_min ↑  /  코너 지연이면 k_v ↓ or k_k ↑
    ld_min: 0.4
    ld_max: 2.5
    k_v:    1.0
    k_k:    2.0

    # ── 곡률 feedforward ──────────────────────────────────────────────────────
    #  δ_ff = k_ff · atan(L · κ)
    #
    #  k_ff
    #    - 0.0: feedforward 비활성 (순수 피드백만)
    #    - 1.0: 운동학적 완전 보상 (raceline 곡률 선행 조향) — 권장
    #    - 코너에서 응답 지연이 있으면 k_ff ↑ 시도
    k_ff: 0.0

    # ── 이득 스케줄 (속도별 K 사전 계산) ────────────────────────────────────
    #  노드 시작 시 v_min_schedule ~ v_max_schedule 구간을 n_schedule 개 점으로
    #  나눠 K 를 미리 계산, 런타임에 선형 보간.
    #  v_max_schedule 은 실제 최고속도보다 약간 크게 설정 권장.
    v_min_schedule: 0.5   # [m/s] 최솟값 (0 근처는 제어불능 → 0.5 이상 유지)
    v_max_schedule: 8.0   # [m/s] 최댓값
    n_schedule:     100    # [-]   격자점 수 (많을수록 정밀, 시작 시간 증가)

    # ── Iterative rollout ────────────────────────────────────────────────────
    #
    #  n_iter  : 고정점 반복 최대 횟수
    #    - 1   : 단순 rollout (iterative 비활성, 이전 버전과 동일)
    #    - 2~3 : 권장. 대부분 2회 이내 수렴
    #    - 5+  : 수렴 정밀도 향상, 계산 비용 증가 (50Hz에서 보통 불필요)
    #
    #  iter_tol : 수렴 판정 임계값 [rad] — |δ_new − δ_old| < tol 이면 조기 종료
    #    - 1e-3 rad ≈ 0.06°
    n_iter:   3
    iter_tol: 1.0e-3

    # ── 속도 명령 ─────────────────────────────────────────────────────────────
    #  가장 가까운 waypoint 기준 n_avg 개 평균 속도 사용
    n_avg: 3

    # ── 가속도 램프 ───────────────────────────────────────────────────────────
    #  속도 증가량을 max_accel * dt [m/s] 로 제한 (급감속은 항상 허용)
    max_accel: 3.0        # [m/s²]
