stanley:
  ros__parameters:
    wheelbase: 0.33          # [m] rear axle to front axle
    k: 2.5                   # Stanley gain — atan2(k·e, v+k_s)
    k_s: 1.5                 # softening — gain decreases naturally with speed
    k_ff: 0.007                # curvature feedforward gain — k_ff·κ·wheelbase
    lookahead_min: 0.02       # [m] minimum lookahead distance
    lookahead_k: 0.07         # [s] speed multiplier — total = lookahead_min + lookahead_k·v
    max_steering_rad: 0.4    # [rad] steering angle limit
    max_speed_mps: 8.0       # [m/s] speed cap
    speed_scale: 0.5         # multiplier on reference vx_mps
    control_rate_hz: 50.0    # [Hz] control loop rate
    drive_topic: /vesc/high_level/ackermann_cmd
