# racecar.ini — F1TENTH vehicle parameters for global trajectory optimization
# Parsed by configparser + json.loads (use JSON types: true/false/null, double-quoted strings)
# width_opt in optim_opts_* is overridden at runtime by ROS params safety_width_iqp / safety_width_sp
# Vehicle parameters unified with IFAC stack (ICRA2026_HJ/stack_master/config/SIM/racecar_f110.ini)
# ----------------------------------------------------------------------------------------------------------------------

[GENERAL_OPTIONS]

ggv_file="ggv.csv"
ax_max_machines_file="ax_max_machines.csv"

# stepsize_prep:              [m] linear interpolation before spline approximation
# stepsize_reg:               [m] stepsize during optimization (IQP node density)
# stepsize_interp_after_opt:  [m] output resolution after optimization

stepsize_opts={"stepsize_prep": 0.05,
               "stepsize_reg": 0.5,
               "stepsize_interp_after_opt": 0.2}

# k_reg: B-Spline order (3 = cubic)
# s_reg: B-spline smoothing factor

reg_smooth_opts={"k_reg": 3,
                 "s_reg": 1}

# v_max:      [m/s]          maximum speed
# length:     [m]            vehicle length
# width:      [m]            vehicle width
# mass:       [kg]           vehicle mass with battery
# dragcoeff:  [kg*m^2/m^3]   0.5 * rho_air * c_w * A_front
# curvlim:    [rad/m]        maximum curvature
# g:          [N/kg]

veh_params={"v_max": 15.0,
            "length": 0.535,
            "width": 0.30,
            "mass": 3.518,
            "dragcoeff": 0.0136,
            "curvlim": 1.5,
            "g": 9.81}

# dyn_model_exp:               [-]  1.0=pure friction, 2.0=aero-dominated
# vel_profile_conv_filt_window: [-]  moving-average window size (null to disable)

vel_calc_opts={"dyn_model_exp": 1.0,
               "vel_profile_conv_filt_window": null}

# d_preview/review_curv: [m] lookahead/lookback for curvature calculation in opt_mintime
# d_preview/review_head: [m] lookahead/lookback for heading calculation in opt_mintime
curv_calc_opts={"d_preview_curv": 2.0,
                "d_review_curv": 2.0,
                "d_preview_head": 1.0,
                "d_review_head": 1.0}

# flip_imp_track:  reverse track direction
# set_new_start:   relocate starting point
# min_track_width: [m]  minimum enforced track width fed to prep_track (null to skip)
# num_laps:        number of laps

imp_opts={"flip_imp_track": false,
          "set_new_start": false,
          "new_start": [0.0, 0.0],
          "min_track_width": 0.8,
          "num_laps": 1}

# ----------------------------------------------------------------------------------------------------------------------
[OPTIMIZATION_OPTIONS]

# width_opt overridden at runtime by ROS param safety_width_sp
optim_opts_shortest_path={"width_opt": 1.20}

# width_opt overridden at runtime by ROS param safety_width_iqp
# iqp_iters_min:         minimum IQP iterations
# iqp_curverror_allowed: [rad/m] max curvature linearisation error

optim_opts_mincurv={"width_opt": 0.8,
                    "iqp_iters_min": 20,
                    "iqp_curverror_allowed": 1.0}

# width_opt:     [m]  safety width (overridden at runtime by safety_width_mintime ROS param)
# mue:           [-]  friction coefficient
# dn:            [m]  normal-direction step size (keep ≤ stepsize_reg)
# var_friction:  null → constant friction, no friction-map files needed
# warm_start:    false → cold start (no previous IPOPT solution files)

optim_opts_mintime={"width_opt": 0.8,
                    "penalty_delta": 1.0,
                    "penalty_F": 0.1,
                    "mue": 1.0,
                    "n_gauss": 5,
                    "dn": 0.1,
                    "limit_energy": false,
                    "energy_limit": 2.0,
                    "safe_traj": false,
                    "ax_pos_safe": null,
                    "ax_neg_safe": null,
                    "ay_safe": null,
                    "reopt_mintime_solution": true,
                    "w_tr_reopt": 1.0,
                    "w_veh_reopt": 0.8,
                    "w_add_spl_regr": 0.0,
                    "step_non_reg": 0,
                    "eps_kappa": 1e-3,
                    "var_friction": null,
                    "warm_start": false}

vehicle_params_mintime={"wheelbase_front": 0.15875,
                        "wheelbase_rear": 0.17145,
                        "track_width_front": 0.281,
                        "track_width_rear": 0.281,
                        "cog_z": 0.074,
                        "I_z": 0.04712,
                        "liftcoeff_front": 0.001,
                        "liftcoeff_rear": 0.0015,
                        "k_brake_front": 0.5,
                        "k_drive_front": 0.0,
                        "k_roll": 0.5,
                        "t_delta": 0.1,
                        "t_drive": 0.1,
                        "t_brake": 0.1,
                        "power_max": 267.0,
                        "f_drive_max": 33.4,
                        "f_brake_max": 47.4,
                        "delta_max": 0.34}

tire_params_mintime={"c_roll": 0.010,
                     "f_z0": 8.6,
                     "B_front": 7.4,
                     "C_front": 1.2,
                     "eps_front": -0.1,
                     "E_front": 0.85,
                     "B_rear": 7.4,
                     "C_rear": 1.2,
                     "eps_rear": -0.1,
                     "E_rear": 0.85}

# pwr_behavior: false → skip powertrain thermal model (only mechanical limits used)
pwr_params_mintime={"pwr_behavior": false}
