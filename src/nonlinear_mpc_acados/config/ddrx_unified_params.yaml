# ROS2 parameter file вҖ” IFAC MPC node.
# Original ROS1 layout (`converter:`, `home_dir:`, etc.) translated to the
# `<node_name>: ros__parameters:` structure rclpy expects. Values are the
# F-track defaults from unicorn-racing-stack/evo_mpcc/params/ddrx_unified_params.yaml.

mpc_node:
  ros__parameters:
    # Backend: 'acados' (SQP_RTI+HPIPM, ~1-5ms) or 'ipopt' (CasADi NLP, ~20-70ms)
    mpc_backend: acados

    # Topics вҖ” match unicorn race_stack convention
    odom_topic_name: /car_state/odom
    localized_pose_topic_name: /car_state/pose
    goal_topic_name: /move_base_simple/goal
    cmd_vel_topic_name: /vesc/high_level/ackermann_cmd_mux/input/nav_1

    # Track loader
    track_name: f                  # вҶ’ share/tracks/trackf/track f_*.csv
    track_dir: ""                  # empty = use installed share/tracks/
    vel_scale: 0.95                # multiply ref_v from CSV col 3
    inflation_factor: 0.0          # 1.2вҶ’0.0 (2026-05-26): random track width 2m м—җм„ң 1.2 к°Җ boundary 0.96m м•ҲмңјлЎң мӨ„м—¬м„ң effective half = 0.04m вҶ’ RViz мғҒ boundary кұ°мқҳ centerline. 0.0 = raw boundary.
    extend_part: 2                 # loop overlap (extend_part=2 вҶ’ +50%)

    # MPC sizing / vehicle limits
    vehicle_L: 0.307               # F1TENTH (unicorn FIESTA1) wheelbase
    # Conservative IFAC-demo baseline. event_stuck CSV м—җм„ң м°Ёк°Җ outside
    # over-shoot нӣ„ reverse stuck вҶ’ л°•нһҲкё° м „м—җ л§үм•„м•ј. 6 вҶ’ 4 (мҪ”л„Ҳ кіјмҶҚ вҶ“).
    max_speed: 5.0
    max_speed_p: 5.0
    # н’Җ-мҠӨнӢ°м–ҙ (Вұ0.4) к°Җ over-shoot мқҳ м§Ғм ‘ мӣҗмқё. 0.4 вҶ’ 0.3 мңјлЎң cap.
    # н—Өм–ҙн•Җ нҶөкіј к°ҖлҠҘн•ң мөңмҶҢк°’: arctan(L / R_min) кё°мӨҖ L=0.307, R_minвүҲ0.7
    # вҶ’ 0.4 rad. к·ёлҹ¬лӮҳ mpc к°Җ лҜёлҰ¬ мЎ°н–Ҙн•ҳлҜҖлЎң 0.3 мңјлЎңлҸ„ м¶©л¶„.
    mpc_max_steering: 0.3
    # Cold-start / low-speed conditioning (2026-05-29, MPPI init_vel кё°лІ•).
    # cold_start_vx_floor: solver м—җ л„ҳкё°лҠ” x0 мқҳ vx н•ҳн•ң (dynamic м ҖмҶҚ ill-cond
    #   нҡҢн”ј вҶ’ м ҖмҶҚ steer chatter м ңкұ° + м •м§Җ м¶ңл°ң). 0 = л№„нҷңм„ұ (кё°мЎҙ PP-start лҸҷмһ‘).
    # startup_speed: мӢӨмёЎ vx к°Җ floor лҜёл§Ңмқј л•Ң м¶ңл Ҙ speed н•ҳн•ң (forward push).
    # мқҙ л‘ҳлЎң кё°мЎҙ 3мҙҲ PP warmup ramp лҢҖмІҙ вҶ’ t=0 л¶Җн„° MPCC мЎ°н–Ҙ.
    cold_start_vx_floor: 2.0
    startup_speed: 1.5
    dT: 0.04                       # 0.025вҶ’0.04 (25Hz control rate). multi-dt мҷҖ кІ°н•© вҖ” мІ« step.
    N_horizon: 50                  # raceline: apex к°җмҶҚ lookahead н•„мҡ” (N25лҠ” лёҢл ҲмқҙнҒ¬ лҠҰм–ҙ wedge)
    # time_steps_mode: 'uniform' (лӘЁл“  step dt=dT) лҳҗлҠ” 'pyramidal' (multi-dt: к°Җк№Ңмқҙ sharp + л©ҖлҰ¬ long planning).
    # pyramidal: dt = [dT]*20 + [dT*1.5]*30 + [dT*2.5]*30
    #   = [0.04]*20 + [0.06]*30 + [0.10]*30 вҶ’ 0.8 + 1.8 + 3.0 = 5.6s horizon
    #   v=4: 22m, v=7: 39m вҖ” лӢӨмқҢ мҪ”л„Ҳ + Оұ ліҙмһ„ вҶ’ outside-inside-outside racing line н•ҷмҠө.
    # solve_ms мҳҒн–Ҙ кұ°мқҳ м—ҶмқҢ (N=80 к·ёлҢҖлЎң). codegen мІҳмқҢ н•ң лІҲ ~30s.
    time_steps_mode: 'uniform'   # pyramidal мӢңлҸ„н–Ҳм§Җл§Ң multi-dt к°Җ ODE/cost stage-dt aware м•Ҳ лҗҳм–ҙ cost spike (3306>200) л§Ө cycle вҶ’ safe fallback. uniform мңјлЎң нӣ„нҮҙ.
    integration_mode: Euler

    # MPC weights file (BO_params_LTM.json bundled in share/config/mpc/)
    params_file: BO_params_LTM

    # Reference path source for mpc:
    #   centerline вҶ’ /centerline_waypoints (нҠёлһҷ н•ңк°ҖмҡҙлҚ°, racing line кұ°лҸҷ
    #                мң„н•ҙ D_apex bias н•„мҡ”. PP-like лҠҗлӮҢ)
    #   raceline   вҶ’ /global_waypoints (IQP мӮ¬м „ мөңм Ғнҷ”лҗң racing line.
    #                мҪ”л„Ҳм—җм„ң мһҗм—°мҠӨлҹҪкІҢ apex нҶөкіј, vx_mps м җлі„ к°ҖмҶҚ/к°җмҶҚ.
    #                D_apex лҠ” 0 к¶ҢмһҘ вҖ” raceline мһҗмІҙк°Җ мқҙлҜё apex нҶөкіј)
    track_source: centerline   # MPCC corridor reference (B-modeк°Җ corridor лӮҙ racing line мһҗмң кІ°м •). raceline лӘЁл“ңлҠ” кө¬мЎ°м Ғ wedge(лҜён•ҙкІ°).

    # auto_tune=true мқҙл©ҙ max_speed н•ң ліҖмҲҳл§Ң мӮ¬мҡ©мһҗк°Җ м„Өм •н•ҳкі , лӮҳлЁём§Җ
    # q_lag / q_cte / max_speed_p / alpha_steer / corridor / D_apex /
    # cost_spike_thr лҠ” _auto_tune_from_max_speed() мқҳ heuristic л§Өн•‘мңјлЎң
    # мһҗлҸҷ кІ°м •. л§Өн•‘ кіөмӢқмқҖ mpc_node.py мқҳ docstring м°ёкі .
    # л№ лҘҙкІҢ нҠңлӢқн•ҳл Өл©ҙ true, мҲҳлҸҷ м •л°Җ нҠңлӢқ мӣҗн•ҳл©ҙ false.
    auto_tune: false   # S1 2026-05-26: deactivate auto_tune mapping (мӮ¬мҡ©мһҗ мқҳлҸ„ вҖ” yaml мқҳ q_*_live к°’мқҙ к·ёлҢҖлЎң м Ғмҡ©лҗҳкІҢ)

    # C: MLP weight scaler. use_ml_scale=true л©ҙ _adaptive_weight_update()
    # к°Җ B heuristic лҢҖмӢ  NN м¶”лЎ  мӮ¬мҡ©. н•ҷмҠөлҗң .pt м—Ҷмңјл©ҙ мһҗлҸҷ B нҸҙл°ұ.
    # н•ҷмҠө: python3 -m nonlinear_mpc_acados.ml.train --epochs 200
    # ml_model_path "" вҶ’ кё°ліё мң„м№ҳ (ml/saved/weight_scaler.pt) мӮ¬мҡ©.
    use_ml_scale: false   # мҲҳм§‘ лӢЁкі„: MLP off, мғҲ B кіөмӢқ (q_drate=1.5+4.0Оә) мңјлЎң лҚ°мқҙн„° мұ„мҡ°кё°
    ml_model_path: ""

    # в”Җв”Җ Dynamic Pacejka лӘЁл“ң в”Җв”Җ
    # dynamic=True: 8-state, tire slip лӘЁлҚёл§Ғ (м •нҷ•, лҠҗлҰј)
    # dyn_tire_model: 'linear' / 'tanh' / 'pacejka'
    #   linear: F_y = C_Оұ В· Оұ (slip мһ‘мқ„ л•Ңл§Ң м •нҷ•)
    #   tanh  : 2026-05-27 review #9. lat_g=24 m/sВІ мҳҒм—ӯм—җм„ң linear н•ңкі„ вҶ’ tanh к¶ҢмһҘ.
    #           мҪ”л„Ҳ м§„мһ… мӢң tire saturation лӘЁлҚёл§Ғ.
    use_dynamic: true
    dyn_tire_model: tanh
    # acados LM regularization for dynamic model (QP conditioning / prediction
    # consistency). 1.0 = previous default. Higher вҶ’ fewer QP_Failure/MINSTEP.
    lm_dynamic: 1.0

    # Phase D вҖ” GP residual learning (offline-trained sparse GP).
    # use_gp_residual=true вҶ’ setup_MPC нӣ„ ResidualLearningMPC лЎң wrap.
    # gp_ckpt_path л№„мҡ°л©ҙ ~/bo_results/gp_residual.pt мһҗлҸҷ.
    # мІ« launch м¶”к°Җ codegen ~30s. import error / нҢҢмқј м—Ҷмңјл©ҙ plain acados fallback.
    use_gp_residual: false
    gp_ckpt_path: ""

    # Phase D (closed-form CasADi GP) вҖ” INDEPENDENT of use_gp_residual.
    # use_gp_casadi=true вҶ’ bakes the trained GP posterior mean as a pure
    # CasADi expression into the DYNAMICS only (cost/p_sym untouched), no
    # torch/gpytorch/l4acados at runtime. Default OFF.
    use_gp_casadi: false

    # B (VPMPCC simplify): override_mode лҠ” 'off' кі м •. BO лҠ” q_*_scale_live л§Ң
    # м§Ғм ‘ к°ұмӢ . legacy modes (fixed / bucketed / polynomial) лҠ” mpc_node.py
    # м—җ мҪ”л“ң кІҪлЎңл§Ң лӮЁкі  yaml нӮӨлҠ” default лЎң fallback.
    override_mode: 'off'

    # мһҗлҸҷ max_speed stepper вҖ” к°ҷмқҖ launch м•Ҳм—җм„ң lap м№ҙмҡҙнҠё кё°л°ҳмңјлЎң
    # effective v_max мһҗлҸҷ мҰқк°Җ. codegen ubu cap (yaml max_speed) к°Җ м ҲлҢҖ
    # мғҒн•ң вҖ” auto_step_end мҷҖ к°ҷкІҢ л‘җкё°. mpc.v_max (cost target) л§Ң ліҖкІҪ.
    #   start вҶ’ end, +size л§ҲлӢӨ laps л°”нҖҙ.
    # 2026-05-28 мӮ¬мҡ©мһҗ idea: v м җм§„ ramp (model mismatch м Ғмқ‘ мӢңк°„ мӨҢ)
    # start=5 (кІҖмҰқ м•Ҳм •) вҶ’ 0.5м”© step вҶ’ end=6 (target). л§Ө 2 lap л§ҲлӢӨ step.
    # = lap 1-2: v=5, lap 3-4: v=5.5, lap 5-6: v=6 (лӘ©н‘ң лҸ„лӢ¬).
    # K1 (2026-05-29): autoreg_speed_bo.sh к°Җ stage лі„лЎң max_speed м§Ғм ‘ set вҶ’
    # н•ң launch м•Ҳмқҳ auto_step ramp мҷҖ лӘЁмҲң (v=7 stage м—җ end=6 мқҙл©ҙ cap м¶©лҸҢ).
    # autoreg sweep мӨ‘м—җлҠ” disable. лӢЁмқј launch v ramp н•„мҡ” мӢң лӢӨмӢң true.
    auto_step_enable: false  # autoreg BO к°Җ stage лі„ max_speed м§Ғм ‘ set вҶ’ auto_step ramp мҷҖ м¶©лҸҢ (K1). BO sweep мӨ‘ off.
    auto_step_start: 5.0
    auto_step_end: 6.0
    auto_step_size: 0.5
    auto_step_laps: 2

    # в”Җв”Җ LMPC (Learning MPC, Rosolia 2018) в”Җв”Җ
    # 2026-05-28 #18: terminal cost = softmin over Sampled Safe Set (K nearest
    # historical states) + regularization. lap-by-lap value function н•ҷмҠөмңјлЎң
    # tire-model mismatch (gym ST vs MPCC Pacejka) лҘј мһҗлҸҷ ліҙмғҒ.
    # use_lmpc=false (default) вҖ” LMPC term cost weight = 0, кё°мЎҙ лҸҷмһ‘ лҸҷмқј.
    use_lmpc: false            # B-mode(BO 18.62, л¬ҙdrift)к°Җ sustained мөңм„ . softmin LMPCлҠ” мҙҲл°ҳ 18.48 лҚ” л№ лҘҙлӮҳ drift мһ”мЎҙ(full Rosolia н•ҳл“ңм ңм•Ҫ н•„мҡ”).
    lmpc_w: 0.1                # softmin term к°ҖмӨ‘ (acados W_e мқҳ lmpc residual entry 1.0 Г— lmpc_w)
    lmpc_alpha: 1.0            # distance penalty in g_i = Q_i + ОұВ·d_iВІ
    lmpc_beta: 0.01           # softmax smoothness. 0.01=м•Ҳм •(1.0мқҖ sharpвҶ’chatterвҶ’wedge кІҖмҰқ).
    lmpc_reg_w: 0.01           # 0.001вҶ’0.01 (reviewer #вҳ…4: regularization к°•нҷ”, Hessian м–‘м •м№ҷ) (best SS attractor)
    lmpc_K_points: 10          # SS kNN K (acados p_sym м—җ hardcoded 10)
    lmpc_K_laps: 4             # most-recent/best K laps (LMPC SS)
    lmpc_slice_window: 50      # Вұ window in step index near current s
    lmpc_enable_after_real_laps: 1   # synthetic seed л§ҢмңјлЎ  нҷңм„ұнҷ” X (reviewer #4-C)
    lmpc_load_path: ""         # npz path to load SS at startup (empty = no load)
    lmpc_save_path: ""   # npz path to save SS at shutdown
    lmpc_seed_from_raceline: true    # cold-start raceline seed (LMPCмҡ©)
    # Failed lap filter (reviewer #4-A вҖ” bad lap мқҙ SS мҳӨм—ј л§үмқҢ)
    lmpc_max_resets: 3
    lmpc_max_abs_ec_m: 100.0
    lmpc_max_lap_time_ratio: 3.0
    lmpc_max_stuck_seconds: 5.0
    lmpc_buffer_per_bucket: 10

    # Fixed-width MPC corridor (centerline/raceline Вұ half-width, мўҢмҡ° лҢҖм№ӯ).
    # raceline лӘЁл“ңм—җм„ң мһҘм• л¬ј нҡҢн”ј мң„н•ҙм„  corridor нҸӯмқҙ м°ЁнҸӯ(0.32) + м•Ҳм „
    # л§Ҳм§„(0.15) + lateral detour offset(0.3) н•©ліҙлӢӨ м»Өм•ј. 0.4 вҶ’ 0.7m.
    # raceline мһҗмІҙк°Җ м•Ҳм • reference мқҙлҜҖлЎң corridor л„“нҳҖлҸ„ oscillation м ҒмқҢ.
    # л„Ҳл¬ҙ нӮӨмҡ°л©ҙ(>0.9) мҪ”л„Ҳм—җм„ң corridor к°Җ нҠёлһҷ лІҪ л°–мңјлЎң л№ м§Ҳ мҲҳлҸ„.
    mpc_corridor_half_width: 0.75  # MPCC corridor half-width (centerlineВұ, racing line м—¬м§Җ)

    # Vehicle dynamics вҖ” only `l_wb` consumed in kinematic mode (current default)
    vehicle.l_wb: 0.307
    vehicle.l_f: 0.162
    vehicle.l_r: 0.145
    vehicle.m: 3.54

    # Live-tunable weights (rqt_reconfigure лҢҖмІҙ). Defaults mirror mpc_core.
    # ROS1 unicorn кІҖмҰқк°’мңјлЎң нҷҳмӣҗ (cycle-flat cost surface мқҳ oscillation мқҖ
    # corridor / D_apex лЎң мһЎкі , cost weights лҠ” кІҖмҰқлҗң к°’ мң м§Җ).
    q_cte_live: 1.0        # B 0.3 вҶ’ Hybrid 1.0 (2026-05-26). лҠҗмҠЁн•ң centerline м¶”мў… + corridor мһҗмң  лҸҷмӢң.
    q_lag_live: 8.0        # B 2.0 вҶ’ Hybrid 8.0. progress м–ҙлҠҗ м •лҸ„ к°•м ң вҖ” м•Ҳм • baseline.
    q_d_delta_live: 25.0   # base к°’. лҸҷм Ғ мЎ°м •мқҖ MLP q_drate_scale_live (1~3Г—) к°Җ лӢҙлӢ№.
    # нҡҢн”ј кұ°лҰ¬ кіөмӢқ: projection вүҘ R_safe + R_car. R_car лҠ” м°Ё л°ҳм§ҖлҰ„,
    # R_safe лҠ” мһҘм• л¬ј мһҗмІҙ л°ҳм§ҖлҰ„ + м•Ҳм „ margin. л‘ҳ л¶„лҰ¬н•ҙм„ң нҠңлӢқ.
    # нҡҢн”ј лІ”мң„ мўҒнһҳ: 0.35 вҶ’ 0.25 (мһҘм• л¬ј л°ҳм§ҖлҰ„ 0.15 + м°Ё мҷёкіҪ margin 0.10).
    # м°Ё мҷёкіҪ вҶ” мһҘм• л¬ј мҷёкіҪ л№Ҳ кіөк°„ вүҲ 0.10m. лҚ” к°Җк№Ңмқҙ нҶөкіј к°ҖлҠҘ.
    R_safe_live: 0.25
    M_slack_live: 20000.0
    # a_lat_safe_live: мҪ”л„Ҳ мёЎл°© к°ҖмҶҚлҸ„ н•ңкі„. нҒ¬л©ҙ мҪ”л„Ҳм—җм„ң лҚ” кіөкІ©м Ғ (ref_v cap = вҲҡ(a_lat/Оә) мҰқк°Җ).
    # rand_a мқҳ Оә_max=0.4417 (R_min=2.26m) вҶ’ v_cap @ a_lat=30 = вҲҡ(30/0.4417) = 8.24 m/s.
    # 6вҶ’10вҶ’15вҶ’30 history. v=6 sweep мң„н•ҙ 30 к№Ңм§Җ мҳ¬лҰј вҖ” к·ёлҹ¬лӮҳ 30(=3g)мқҖ к·ёлҰҪ н•ңкі„
    # (~0.9g) мҙҲкіјлқј кіЎлҘ  speed-cap л¬ҙл Ҙнҷ” вҶ’ нғҖмқҙнҠё мҪ”л„Ҳ кіјмҶҚ м§„мһ… вҶ’ л°•нһҳ (2026-05-29
    # м§„лӢЁ: лӮЁмқҖ stall 13/13 over-speed entry). л¬јлҰ¬м Ғ к·ёлҰҪмңјлЎң ліөмӣҗ: 8 > 6 (мҪ”л“ң мЈјм„қмқҳ
    # мқҳлҸ„к°’, a_lat_max=8 hard м•„лһҳ headroom). ref_v cap = вҲҡ(a_lat/Оә) к°Җ мҪ”л„Ҳм„ң мӢӨм ң мһ‘лҸҷ.
    a_lat_safe_live: 6.0   # known-good
    # D_detour_live: нҡҢн”ј мӢң lateral offset [m]. 0.3 вҶ’ 0.2 вҶ’ 0.1.
    # R_safe (hard constraint, 0.25m) к°Җ м¶©лҸҢ нҡҢн”ј ліҙмһҘн•ҳлҜҖлЎң D_detour лҠ”
    # soft target л§Ңмқҙлқј мһ‘м•„лҸ„ м•Ҳм „. нҡҢн”ј нӣ„ raceline ліөк·Җ мӢң over-shoot вҶ“.
    D_detour_live: 0.1
    # D_apex_live: B лӢЁмҲңнҷ” нӣ„ dead path. acados_kinematic.py мқҳ e_c_ref=0
    # н•ҳл“ңмҪ”л”© вҶ’ param мҠ¬лЎҜ p_sym[11] л§Ң м°Ём§Җн•ҳкі  cost м—җ м•Ҳ л“Өм–ҙк°җ.
    D_apex_live: 0.0
    # R_car_live: м°Ё л°ҳм§ҖлҰ„ (m). F1TENTH width 0.30 Г· 2 = 0.15.
    R_car_live: 0.15               # мӣҗлһҳк°’ ліөмӣҗ
    # commit_dist_live: нҡҢн”ј мӢңмһ‘ кұ°лҰ¬. нҒҙмҲҳлЎқ мқјм°Қ commit. 10 вҶ’ 15 (мқјм°Қ).
    commit_dist_live: 15.0
    # cost_spike_thr_live: ringing мһЎкё° мң„н•ҙ 500 вҶ’ 200 мңјлЎң лӮ®м¶Ө. fallback
    # (ref_vВ·0.3 + heading hold + warm-start rebuild) к°Җ oscillation мҙҲкё°м—җ
    # нҠёлҰ¬кұ°лҗЁ.
    cost_spike_thr_live: 8000.0  # 1500вҶ’8000 (2026-05-28 fix). v=6/7/8 мӢң мӢӨмёЎ м •мғҒ cost 500-2000. 1500 л„Ҳл¬ҙ л№Ўл№Ўн•ҙм„ң м •мғҒ мҡҙм „лҸ„ fallback л¬ҙн•ң cycle вҶ’ BO plateau. 8000 = м§„м§ң instability (10K+) л§Ң нҠёлҰ¬кұ°.
    alpha_steer_live: 0.4   # base. auto_tune л§Өн•‘мқҙ max_speed л”°лқј к°ұмӢ .
    # 2026-05-28 BO v=6 retry best вҖ” 30 iter post-#13, Q=-47.57, lap=14.32s
